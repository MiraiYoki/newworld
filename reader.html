<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>阅读 · 剧本杀阅读器</title>
  <link rel="stylesheet" href="css/common.css?v=3">
  <link rel="stylesheet" href="css/reader.css?v=3">
</head>
<body>
  <div class="reader-page page-enter">

    <!-- 四角神圣装饰 -->
    <div class="sacred-corner top-left"><div class="flourish"></div><div class="dot"></div></div>
    <div class="sacred-corner top-right"><div class="flourish"></div><div class="dot"></div></div>
    <div class="sacred-corner bottom-left"><div class="flourish"></div><div class="dot"></div></div>
    <div class="sacred-corner bottom-right"><div class="flourish"></div><div class="dot"></div></div>

    <!-- 阅读进度条 -->
    <div class="read-progress" id="readProgress"></div>

    <!-- 顶栏 -->
    <div class="top-bar" id="topBar">
      <button class="btn-icon" onclick="goBack()" title="返回">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      </button>
      <span class="title" id="topTitle">阅读器</span>
      <button class="btn-icon" onclick="openPanel('settings')" title="设置">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
      </button>
    </div>

    <!-- 章节切换器 -->
    <div class="chapter-switcher" id="chapterSwitcher">
      <button class="btn-icon" id="prevChapterBtn" onclick="prevChapter()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
      <div class="chapter-select-wrapper">
        <button class="chapter-select-trigger" id="chapterSelectTrigger" onclick="toggleChapterDropdown()">
          <span id="chapterSelectLabel">选择章节</span>
          <span class="chapter-select-arrow"></span>
        </button>
        <div class="chapter-select-dropdown" id="chapterSelectDropdown">
        </div>
      </div>
      <select id="chapterSelect" onchange="switchChapter(this.value)"></select>
      <button class="btn-icon" id="nextChapterBtn" onclick="nextChapter()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
      </button>
    </div>

    <!-- 主阅读内容 -->
    <div class="reader-content" id="readerContent">
      <div class="text-center" style="padding:3rem 1rem;color:var(--text-muted)">
        请先选择角色和章节开始阅读。
      </div>
    </div>

    <!-- 底部工具栏 -->
    <div class="bottom-bar">
      <button class="bar-btn" onclick="tryOpenTasks()" id="btnTasks">
        <span class="bar-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M9 12l2 2 4-4"/></svg>
        </span><span id="btnTasksText">任务</span>
      </button>
      <button class="bar-btn" onclick="openPanel('clues')" id="btnClues">
        <span class="bar-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
        </span>线索
      </button>
      <button class="bar-btn" onclick="openPanel('favorites')" id="btnFavs">
        <span class="bar-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        </span>收藏
      </button>
      <button class="bar-btn" onclick="openPanel('search')" id="btnSearch">
        <span class="bar-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.35-4.35"/></svg>
        </span>搜索
      </button>
      <button class="bar-btn" onclick="openPanel('special')" id="btnSpecial">
        <span class="bar-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        </span>特殊
      </button>
    </div>

    <!-- 遮罩层 -->
    <div class="overlay" id="overlay" onclick="closeAllPanels()"></div>

    <!-- ====== 侧滑面板 ====== -->

    <!-- 任务面板 -->
    <div class="slide-panel" id="panelTasks">
      <div class="panel-header">
        <span class="panel-title">任务</span>
        <button class="btn-icon" onclick="closeAllPanels()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
      </div>
      <div class="panel-body" id="taskList">
        <p style="color:var(--text-muted);text-align:center;padding:2rem 0">点击任务可标记完成。</p>
      </div>
    </div>

    <!-- 线索面板 -->
    <div class="slide-panel" id="panelClues">
      <div class="panel-header">
        <span class="panel-title">线索栏</span>
        <button class="btn-icon" onclick="closeAllPanels()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
      </div>
      <!-- 搜证轮次选择 -->
      <div class="evidence-round-tabs" id="evidenceRoundTabs"></div>
      <div class="panel-body" id="clueList">
        <p style="color:var(--text-muted);text-align:center;padding:2rem 0">暂无已搜集的线索。</p>
      </div>
    </div>

    <!-- 收藏/高亮面板 -->
    <div class="slide-panel" id="panelFavorites">
      <div class="panel-header">
        <span class="panel-title">收藏 &amp; 高亮</span>
        <button class="btn-icon" onclick="closeAllPanels()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
      </div>
      <div class="panel-body" id="favList">
        <p style="color:var(--text-muted);text-align:center;padding:2rem 0">暂无收藏。</p>
      </div>
    </div>

    <!-- 搜索面板 -->
    <div class="slide-panel" id="panelSearch">
      <div class="panel-header">
        <span class="panel-title">全文搜索</span>
        <button class="btn-icon" onclick="closeAllPanels()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
      </div>
      <div class="panel-body">
        <div class="search-input-wrap">
          <input type="text" id="searchInput" placeholder="输入关键词即时搜索..." oninput="doSearch()">
        </div>
        <div id="searchResults">
          <p style="color:var(--text-muted);text-align:center;padding:1rem 0">输入关键词搜索所有剧本内容。</p>
        </div>
      </div>
    </div>

    <!-- 设置面板 -->
    <div class="slide-panel" id="panelSettings">
      <div class="panel-header">
        <span class="panel-title">阅读设置</span>
        <button class="btn-icon" onclick="closeAllPanels()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
      </div>
      <div class="panel-body">
        <div class="setting-row">
          <span class="setting-label">背景主题</span>
          <div class="theme-options">
            <span class="theme-dot default active" onclick="setTheme('default')" title="默认"></span>
            <span class="theme-dot white" onclick="setTheme('white')" title="纯白"></span>
            <span class="theme-dot dawn" onclick="setTheme('dawn')" title="破晓"></span>
            <span class="theme-dot green" onclick="setTheme('green')" title="护眼绿"></span>
            <span class="theme-dot yellow" onclick="setTheme('yellow')" title="护眼黄"></span>
            <span class="theme-dot celestial" onclick="setTheme('celestial')" title="神圣"></span>
            <span class="theme-dot wasteland" onclick="setTheme('wasteland')" title="废土"></span>
          </div>
        </div>
        <div class="setting-row">
          <span class="setting-label">字体大小</span>
          <div class="font-options">
            <button class="font-btn" onclick="setFontSize('small')">小</button>
            <button class="font-btn active" onclick="setFontSize('medium')">中</button>
            <button class="font-btn" onclick="setFontSize('large')">大</button>
            <button class="font-btn" onclick="setFontSize('xlarge')">特大</button>
          </div>
        </div>
        <div class="setting-row" style="flex-direction:column;align-items:flex-start;gap:0.5rem">
          <button class="btn btn-danger btn-sm" onclick="resetAllData()">重置所有数据</button>
          <span style="font-size:0.72rem;color:var(--text-muted)">阅读进度、收藏、高亮、线索全部清除</span>
        </div>
        <div class="setting-row" style="justify-content:flex-start">
          <span style="font-size:0.72rem;color:var(--text-muted)">v<span id="versionDisplay"></span></span>
        </div>
      </div>
    </div>

    <!-- 特殊章节面板 -->
    <div class="slide-panel" id="panelSpecial">
      <div class="panel-header">
        <span class="panel-title">特殊章节</span>
        <button class="btn-icon" onclick="closeAllPanels()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
      </div>
      <div class="panel-body" id="specialPanelBody">
        <div class="special-unlock" id="specialUnlock">
          <p>输入密码解锁<strong>特殊章节</strong></p>
          <p class="hint">密码提示：特殊之日</p>
          <input type="text" id="specialCodeInput" placeholder="请输入密码" maxlength="20">
          <button class="btn btn-primary" onclick="unlockSpecial()">解锁</button>
          <p id="specialMsg" style="margin-top:0.5rem;font-size:0.82rem;color:var(--text-muted)"></p>
        </div>
        <div class="special-options hidden" id="specialOptions">
          <div class="special-option-list" id="specialOptionList"></div>
        </div>
      </div>
    </div>

    <!-- 信件阅读浮层 -->
    <div class="letter-overlay" id="letterOverlay">
      <button class="letter-overlay-close" onclick="closeLetter()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg>
        <span>关闭</span>
      </button>
      <div class="letter-paper" id="letterPaper"></div>
    </div>

    <!-- 彩蛋全屏浮层 -->
    <div class="egg-overlay" id="eggOverlay">
      <div class="egg-close" onclick="closeEgg()">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </div>
      <canvas id="eggCanvas"></canvas>
      <div class="egg-text" id="eggText"></div>
    </div>

    <!-- 地图碎片浮层 -->
    <div class="mapfrag-overlay" id="mapfragOverlay">
      <button class="mapfrag-close" onclick="closeMapFrag()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg>
        <span>关闭</span>
      </button>
      <div class="mapfrag-container" id="mapfragContainer"></div>
    </div>

    <!-- 点名册浮层 -->
    <div class="rollbook-overlay" id="rollbookOverlay">
      <button class="rollbook-close" onclick="closeRollbook()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg>
        <span>关闭</span>
      </button>
      <div class="rollbook-paper" id="rollbookPaper"></div>
    </div>

    <!-- 会议室小剧场浮层 -->
    <div class="mt-overlay" id="mtOverlay">
      <button class="mt-close" onclick="closeMeetingTheater()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg>
        <span>关闭</span>
      </button>
      <div class="mt-paper" id="mtPaper"></div>
    </div>

    <!-- 物品浮层 -->
    <div class="item-overlay" id="itemOverlay">
      <button class="item-close" onclick="closeItem()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg>
        <span>关闭</span>
      </button>
      <div class="item-paper" id="itemPaper"></div>
    </div>

    <!-- 录音浮层 -->
    <div class="recording-overlay" id="recordingOverlay">
      <button class="recording-close" onclick="closeRecording()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg>
        <span>关闭</span>
      </button>
      <div class="recording-paper" id="recordingPaper"></div>
    </div>

    <!-- 鸟群浮层 -->
    <div class="birdlist-overlay" id="birdlistOverlay">
      <button class="birdlist-close" onclick="closeBirdList()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg>
        <span>关闭</span>
      </button>
      <div class="birdlist-paper" id="birdlistPaper"></div>
    </div>

    <!-- 愿望选择弹窗 -->
    <div class="overlay" id="wishOverlay" onclick="closeWishModal()"></div>
    <div class="char-modal hidden" id="wishModal">
      <div class="modal-content" style="text-align:center">
        <div style="font-size:1.1rem;font-weight:600;margin-bottom:1rem;color:var(--text-primary)">任鸣的愿望</div>
        <div style="font-size:0.9rem;color:var(--text-muted);margin-bottom:1.5rem">请做出你的选择</div>
        <div class="wish-choices" style="display:flex;flex-direction:column;gap:0.8rem;margin-bottom:1.5rem">
          <button class="btn btn-primary" onclick="selectEnding('sea')" style="padding:0.8rem 1.2rem;font-size:0.95rem">一起去看海</button>
          <button class="btn btn-primary" onclick="selectEnding('life')" style="padding:0.8rem 1.2rem;font-size:0.95rem">延续任鸣的生命</button>
        </div>
      </div>
    </div>

    <!-- 结局展示浮层 -->
    <div class="ending-overlay" id="endingOverlay">
      <button class="ending-close" onclick="closeEnding()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg>
        <span>关闭</span>
      </button>
      <div class="ending-paper" id="endingPaper"></div>
    </div>

    <!-- 周然的世界浮层 -->
    <div class="zhouran-world-overlay" id="zhouranWorldOverlay">
      <button class="zhouran-world-close" onclick="closeZhouRanWorld()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg>
        <span>关闭</span>
      </button>
      <div class="zhouran-world-paper" id="zhouranWorldPaper"></div>
    </div>

    <!-- 唐潮信件浮层 -->
    <div class="tangchao-letter-overlay" id="tangchaoLetterOverlay">
      <button class="tangchao-letter-close" onclick="closeTangchaoLetter()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg>
        <span>关闭</span>
      </button>
      <div class="tangchao-letter-paper" id="tangchaoLetterPaper"></div>
    </div>

    <!-- H图片集浮层 -->
    <div class="h-gallery-overlay" id="hGalleryOverlay">
      <button class="h-gallery-close" onclick="closeHGallery()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg>
        <span>关闭</span>
      </button>
      <div class="h-gallery-counter" id="hGalleryCounter">1 / 9</div>
      <div class="h-gallery-container" id="hGalleryContainer">
        <img class="h-gallery-image" id="hGalleryImage" src="" alt="H">
      </div>
      <button class="h-gallery-nav h-gallery-prev" onclick="prevHImage()">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
      <button class="h-gallery-nav h-gallery-next" onclick="nextHImage()">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 18l6-6-6-6"/></svg>
      </button>
    </div>

    <!-- 任鸣诗集浮层 -->
    <div class="h-gallery-overlay" id="renmingGalleryOverlay">
      <button class="h-gallery-close" onclick="closeRenmingGallery()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg>
        <span>关闭</span>
      </button>
      <div class="h-gallery-counter" id="renmingGalleryCounter">1 / 5</div>
      <div class="h-gallery-container" id="renmingGalleryContainer">
        <img class="h-gallery-image" id="renmingGalleryImage" src="" alt="任鸣诗集">
      </div>
      <button class="h-gallery-nav h-gallery-prev" onclick="prevRenmingImage()">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
      <button class="h-gallery-nav h-gallery-next" onclick="nextRenmingImage()">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 18l6-6-6-6"/></svg>
      </button>
    </div>

    <!-- 李云意诗集浮层 -->
    <div class="h-gallery-overlay" id="liyunyiGalleryOverlay">
      <button class="h-gallery-close" onclick="closeLiyunyiGallery()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg>
        <span>关闭</span>
      </button>
      <div class="h-gallery-counter" id="liyunyiGalleryCounter">1 / 5</div>
      <div class="h-gallery-container" id="liyunyiGalleryContainer">
        <img class="h-gallery-image" id="liyunyiGalleryImage" src="" alt="李云意诗集">
      </div>
      <button class="h-gallery-nav h-gallery-prev" onclick="prevLiyunyiImage()">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
      <button class="h-gallery-nav h-gallery-next" onclick="nextLiyunyiImage()">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 18l6-6-6-6"/></svg>
      </button>
    </div>

    <!-- 江雪诗集浮层 -->
    <div class="h-gallery-overlay" id="jiangxueGalleryOverlay">
      <button class="h-gallery-close" onclick="closeJiangxueGallery()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg>
        <span>关闭</span>
      </button>
      <div class="h-gallery-counter" id="jiangxueGalleryCounter">1 / 6</div>
      <div class="h-gallery-container" id="jiangxueGalleryContainer">
        <img class="h-gallery-image" id="jiangxueGalleryImage" src="" alt="江雪诗集">
      </div>
      <button class="h-gallery-nav h-gallery-prev" onclick="prevJiangxueImage()">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
      <button class="h-gallery-nav h-gallery-next" onclick="nextJiangxueImage()">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 18l6-6-6-6"/></svg>
      </button>
    </div>

    <!-- 贺冬青诗集浮层 -->
    <div class="h-gallery-overlay" id="hedongqingGalleryOverlay">
      <button class="h-gallery-close" onclick="closeHedongqingGallery()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg>
        <span>关闭</span>
      </button>
      <div class="h-gallery-counter" id="hedongqingGalleryCounter">1 / 4</div>
      <div class="h-gallery-container" id="hedongqingGalleryContainer">
        <img class="h-gallery-image" id="hedongqingGalleryImage" src="" alt="贺冬青诗集">
      </div>
      <button class="h-gallery-nav h-gallery-prev" onclick="prevHedongqingImage()">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
      <button class="h-gallery-nav h-gallery-next" onclick="nextHedongqingImage()">

  <!-- 阅读器核心 -->
  <script>
  (function() {
    'use strict';

    // ===== 状态 =====
    var currentCharId = null;
    var currentChapterId = null;
    var currentPanel = null;
    var chapterReadDone = {};

    // ===== 初始化 =====
    Settings.init();
    document.getElementById('versionDisplay').textContent = AppConfig.version;

    var params = new URLSearchParams(location.search);
    var urlChar = params.get('char');
    if (urlChar) {
      currentCharId = urlChar;
      Storage.set('selected_character', currentCharId);
    } else {
      currentCharId = Storage.get('selected_character');
    }

    if (!currentCharId) {
      document.getElementById('readerContent').innerHTML =
        '<div class="text-center" style="padding:3rem 1rem;color:var(--text-muted)">'
        + '<p>未选择角色</p>'
        + '<button class="btn btn-primary mt-2" onclick="location.href=\'character.html\'">前往选择</button>'
        + '</div>';
      document.getElementById('chapterSwitcher').classList.add('hidden');
    } else {
      updateClueBadge();
      // 选择角色时，总是从第一章开始
      loadCharacter(currentCharId, null);
    }

    // ===== 加载角色剧本 =====
    function loadCharacter(charId, targetChapter) {
      var char = CHARACTERS.find(function(c) { return c.id === charId; });
      if (!char) {
        Debug.error('Character not found', { charId: charId });
        return;
      }

      document.getElementById('topTitle').textContent = char.name + ' · ' + (AppConfig.name || '剧本杀');
      var loaded = 0;
      char.chapters.forEach(function(chId) {
        var script = document.createElement('script');
        script.src = 'data/scripts/' + charId + '/' + chId + '.js';
        script.onload = function() {
          loaded++;
          if (loaded === char.chapters.length) onAllChaptersLoaded(char, targetChapter);
        };
        script.onerror = function() {
          Debug.error('Chapter load failed', { charId: charId, chapterId: chId });
          loaded++;
          if (loaded === char.chapters.length) onAllChaptersLoaded(char, targetChapter);
        };
        document.head.appendChild(script);
      });
    }

    function onAllChaptersLoaded(char, targetChapter) {
      document.getElementById('chapterSwitcher').classList.remove('hidden');
      var select = document.getElementById('chapterSelect');
      select.innerHTML = '';
      var dropdown = document.getElementById('chapterSelectDropdown');
      dropdown.innerHTML = '';
      var currentLabel = '';
      char.chapters.forEach(function(chId, idx) {
        var chapterData = SCRIPT_DATA[char.id] && SCRIPT_DATA[char.id][chId];
        var isTheater = chId.indexOf('theater') >= 0;
        var label;
        if (chapterData) {
          // 只显示标题，去掉点号和副标题
          label = chapterData.title;
        } else {
          label = isTheater ? '小剧场' : ('第' + (idx + 1) + '章');
        }
        var opt = document.createElement('option');
        opt.value = chId;
        opt.textContent = label;
        select.appendChild(opt);

        // 同时更新自定义下拉菜单
        var optionEl = document.createElement('div');
        optionEl.className = 'chapter-select-option';
        optionEl.dataset.chapterId = chId;
        optionEl.textContent = label;
        optionEl.onclick = function() {
          switchChapter(chId);
          closeChapterDropdown();
        };
        dropdown.appendChild(optionEl);

        // 设置默认选中的标签
        if (!targetChapter && idx === 0) {
          currentLabel = label;
        }
        if (targetChapter === chId) {
          currentLabel = label;
        }
      });
      document.getElementById('chapterSelectLabel').textContent = currentLabel || '选择章节';
      var startChapter = targetChapter || char.chapters[0];
      switchChapter(startChapter);
      updateChapterNav(char);
      Debug.info('Character loaded', { charId: char.id, chapters: char.chapters.length });
    }

    // ===== 章节切换 =====
    function switchChapter(chapterId) {
      currentChapterId = chapterId;
      Storage.set('last_chapter_' + currentCharId, chapterId);
      var chapterData = SCRIPT_DATA[currentCharId] && SCRIPT_DATA[currentCharId][chapterId];
      if (!chapterData) {
        document.getElementById('readerContent').innerHTML =
          '<div class="text-center" style="padding:3rem 1rem;color:var(--text-muted)">章节内容加载失败</div>';
        return;
      }
      renderChapter(chapterData);
      updateChapterNav(CHARACTERS.find(function(c) { return c.id === currentCharId; }));
      document.getElementById('chapterSelect').value = chapterId;
      // 更新自定义下拉菜单的标签和选中状态
      updateChapterDropdownLabel(chapterId);
      initChapterTasks();
      restoreHighlights();
      window.scrollTo({ top: 0, behavior: 'smooth' });
      updateReadProgress();
      Debug.info('Chapter switched', { chapterId: chapterId });
      // 章节切换后重新检查任务解锁状态
      onChapterLoaded();
    }

    // 更新自定义下拉菜单标签
    function updateChapterDropdownLabel(chapterId) {
      var char = CHARACTERS.find(function(c) { return c.id === currentCharId; });
      if (!char) return;
      var idx = char.chapters.indexOf(chapterId);
      if (idx < 0) return;
      var chapterData = SCRIPT_DATA[currentCharId] && SCRIPT_DATA[currentCharId][chapterId];
      var isTheater = chapterId.indexOf('theater') >= 0;
      var label;
      if (chapterData) {
        // 去掉点号，只显示标题
        label = chapterData.title;
      } else {
        label = isTheater ? '小剧场' : ('第' + (idx + 1) + '章');
      }
      document.getElementById('chapterSelectLabel').textContent = label;

      // 更新下拉菜单选项的选中状态
      var options = document.querySelectorAll('.chapter-select-option');
      options.forEach(function(opt) {
        opt.classList.toggle('active', opt.dataset.chapterId === chapterId);
      });
    }

    // 切换下拉菜单显示/隐藏
    window.toggleChapterDropdown = function(e) {
      if (e) {
        e.stopPropagation();
      }
      var dropdown = document.getElementById('chapterSelectDropdown');
      var trigger = document.getElementById('chapterSelectTrigger');
      if (dropdown && trigger) {
        var isOpen = dropdown.classList.contains('open');
        // 先关闭所有其他面板
        closeAllPanels();
        
        if (!isOpen) {
          dropdown.classList.add('open');
          trigger.classList.add('active');
        }
      }
    }

    // 关闭下拉菜单
    function closeChapterDropdown() {
      var dropdown = document.getElementById('chapterSelectDropdown');
      var trigger = document.getElementById('chapterSelectTrigger');
      if (dropdown) dropdown.classList.remove('open');
      if (trigger) trigger.classList.remove('active');
    }

    function prevChapter() {
      var char = CHARACTERS.find(function(c) { return c.id === currentCharId; });
      if (!char) return;
      var idx = char.chapters.indexOf(currentChapterId);
      if (idx > 0) switchChapter(char.chapters[idx - 1]);
    }
    function nextChapter() {
      var char = CHARACTERS.find(function(c) { return c.id === currentCharId; });
      if (!char) return;
      var idx = char.chapters.indexOf(currentChapterId);
      if (idx < char.chapters.length - 1) switchChapter(char.chapters[idx + 1]);
    }
    function updateChapterNav(char) {
      if (!char) return;
      var idx = char.chapters.indexOf(currentChapterId);
      document.getElementById('prevChapterBtn').style.visibility = idx > 0 ? 'visible' : 'hidden';
      document.getElementById('nextChapterBtn').style.visibility = idx < char.chapters.length - 1 ? 'visible' : 'hidden';
    }

    // ===== 渲染章节（连续叙事，无类型标签） =====
    function renderChapter(chapterData) {
      var html = '';
      html += '<h2 class="chapter-title">' + escapeHtml(chapterData.title) + '</h2>';
      html += '<p class="chapter-subtitle">' + escapeHtml(chapterData.subtitle) + '</p>';

      var textBlockCount = 0;
      chapterData.sections.forEach(function(sec, idx) {
        if (sec.type === 'theater') {
          html += renderTheater(sec);
          textBlockCount = 0;
        } else if (sec.type === 'image') {
          html += '<div class="chapter-image-container"><img class="chapter-image" src="' + escapeHtml(sec.src) + '" alt="' + escapeHtml(sec.alt || '') + '"></div>';
          textBlockCount = 0;
        } else {
          // 将内容按换行符分割成单独的段落
          var paragraphs = sec.content.split('\n');
          // 检查整个section是否包含居中或小字体标签
          var isCenterSection = sec.content.indexOf('[center]') >= 0;
          var isSmallSection = sec.content.indexOf('[small]') >= 0;
          paragraphs.forEach(function(para, pIdx) {
            para = para.trim();
            if (!para) return; // 跳过空行
            
            // 每3-4个叙事段落后插入装饰分隔符
            if (textBlockCount > 0 && textBlockCount % 4 === 0) {
              html += '<div class="para-ornament">◆</div>';
            }
            html += '<p class="text-block' + (isCenterSection ? ' center-bold' : '') + (isSmallSection ? ' small-text' : '') + '" data-section-id="' + sec.id + '_' + pIdx + '">'
              + escapeHtml(para)
                .replace(/&lt;strong&gt;/g, '<strong>').replace(/&lt;\/strong&gt;/g, '</strong>')
                .replace(/&lt;center&gt;/g, '').replace(/&lt;\/center&gt;/g, '')
                .replace(/&lt;small&gt;/g, '').replace(/&lt;\/small&gt;/g, '')
                .replace(/\[center\]/g, '').replace(/\[\/center\]/g, '')
                .replace(/\[small\]/g, '').replace(/\[\/small\]/g, '')
              + '</p>';
            textBlockCount++;
          });
        }
      });

      html += '<div class="chapter-end">— 本章完 —</div>';

      document.getElementById('readerContent').innerHTML = html;
      initChapterTasks();
    }

    function renderTheater(sec) {
      var h = '';
      h += '<div class="theater-block" data-section-id="' + sec.id + '">';
      h += '<div class="theater-glass-shine"></div>';
      if (sec.theaterTitle) {
        h += '<div class="theater-title">' + escapeHtml(sec.theaterTitle) + '</div>';
      }
      var lines = sec.content.split('\n');
      lines.forEach(function(line) {
        line = line.trim();
        if (!line) return;
        // 舞台说明 / 旁白（括号包裹或以 * 开头）
        if (/^[（(＊*]/.test(line) || /^\(/.test(line)) {
          h += '<div class="theater-stage-dir">' + escapeHtml(line.replace(/^[＊*]\s*/, '')) + '</div>';
          return;
        }
        // 分隔线
        if (line === '***' || line === '---') {
          h += '<div class="theater-divider">· · ·</div>';
          return;
        }
        // 角色对话：Name：Text 或 Name: Text
        var m = line.match(/^(.+?)[：:]\s*(.+)$/);
        if (m) {
          var charName = m[1].trim();
          h += '<div class="theater-line">'
            + '<span class="char-name c-' + escapeHtml(charName) + '">' + escapeHtml(charName) + '：</span>'
            + '<span class="char-dialogue">' + escapeHtml(m[2].trim()) + '</span>'
            + '</div>';
        } else {
          h += '<div class="theater-line">' + escapeHtml(line) + '</div>';
        }
      });
      h += '</div>';
      return h;
    }

    function escapeHtml(str) {
      var div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    // ===== 高亮系统（含取消高亮） =====
    function restoreHighlights() {
      var highlights = Favorites.getHighlights(currentCharId, currentChapterId);
      highlights.forEach(function(h) {
        if (h.isCrossBlock && h.blockHighlights) {
          // 跨段高亮：直接使用保存的每一段的文本
          h.blockHighlights.forEach(function(bh) {
            var block = document.querySelector('.text-block[data-section-id="' + bh.sectionId + '"]');
            if (block && block.textContent.indexOf(bh.text) >= 0) {
              highlightTextInBlock(block, bh.text, h.id);
            }
          });
        } else {
          // 普通单段高亮
          var blocks = document.querySelectorAll('.text-block');
          blocks.forEach(function(block) {
            if (block.getAttribute('data-section-id') === h.sectionId && block.textContent.indexOf(h.text) >= 0) {
              highlightTextInBlock(block, h.text, h.id);
            }
          });
        }
      });

      var contentEl = document.getElementById('readerContent');
      contentEl.removeEventListener('click', handleHighlightClick);
      contentEl.addEventListener('click', handleHighlightClick);
    }

    function highlightTextInBlock(block, text, hlId) {
      var html = block.innerHTML;
      if (html.indexOf('data-hl-id="' + hlId + '"') >= 0) return;
      var textNodes = [];
      var walk = document.createTreeWalker(block, NodeFilter.SHOW_TEXT, null, false);
      var node;
      while (node = walk.nextNode()) {
        var idx = node.textContent.indexOf(text);
        if (idx >= 0) {
          textNodes.push({ node: node, idx: idx });
        }
      }
      textNodes.forEach(function(item) {
        var n = item.node;
        var i = item.idx;
        var before = document.createTextNode(n.textContent.substring(0, i));
        var mark = document.createElement('mark');
        mark.setAttribute('data-hl-id', hlId);
        mark.setAttribute('title', '点击取消高亮');
        mark.textContent = text;
        var after = document.createTextNode(n.textContent.substring(i + text.length));
        var parent = n.parentNode;
        parent.insertBefore(before, n);
        parent.insertBefore(mark, n);
        parent.insertBefore(after, n);
        parent.removeChild(n);
      });
    }

    // 高亮点击处理器
    function handleHighlightClick(e) {
      var mark = e.target.closest('mark[data-hl-id]');
      if (!mark) return;
      e.preventDefault();
      e.stopPropagation();
      var hlId = mark.getAttribute('data-hl-id');
      if (hlId && confirm('取消此高亮标记？')) {
        Favorites.removeHighlight(hlId);
        var allMarks = document.querySelectorAll('mark[data-hl-id="' + hlId + '"]');
        allMarks.forEach(function(m) {
          var parent = m.parentNode;
          if (parent) {
            parent.replaceChild(document.createTextNode(m.textContent), m);
            parent.normalize();
          }
        });
        updateFavPanel();
        showToast('已取消高亮');
      }
    }

    function escapeRegex(str) {
      return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    }

    window.highlightSelected = function() {
      if (!pendingSelection) { showToast('请选中文字后再操作'); return; }
      var ps = pendingSelection;
      var text = ps.text;
      var existing = Favorites.getHighlights(currentCharId, currentChapterId);
      var dup = existing.find(function(h) { return h.text === text && h.sectionId === ps.sectionId; });
      if (dup) {
        Favorites.removeHighlight(dup.id);
        showToast('已取消高亮');
        restoreHighlights();
        updateFavPanel();
        clearPendingSelection();
        return;
      }
      var extra = null;
      if (ps.isCrossBlock) {
        extra = { 
          isCrossBlock: true, 
          startSectionId: ps.startSectionId, 
          endSectionId: ps.endSectionId,
          blockHighlights: ps.blockHighlights 
        };
      }
      Favorites.addHighlight(text, currentCharId, currentChapterId, ps.sectionId, 0, text.length, extra);
      clearPendingSelection();
      restoreHighlights();
      updateFavPanel();
      showToast('已高亮（点击高亮文字可取消）');
    };

    window.favoriteSelected = function() {
      if (!pendingSelection) { showToast('请选中文字后再操作'); return; }
      var ps = pendingSelection;
      var item = Favorites.add(ps.text, currentCharId, currentChapterId, ps.sectionId, ps.offset);
      if (item) {
        updateFavPanel();
        showToast('已添加到收藏夹');
      } else {
        showToast('已在收藏夹中');
      }
      clearPendingSelection();
    };

    function clearAllHighlights() {
      var highlights = Favorites.getHighlights(currentCharId, currentChapterId);
      highlights.forEach(function(h) { Favorites.removeHighlight(h.id); });
      renderChapter(SCRIPT_DATA[currentCharId][currentChapterId]);
      restoreHighlights();
      updateFavPanel();
      showToast('已清除本章所有高亮');
    }

    // ===== 收藏弹窗 =====
    var pendingFavorite = null;
    window.closeFavModal = function() {
      document.getElementById('favOverlay').classList.remove('show');
      document.getElementById('favModal').classList.add('hidden');
      pendingFavorite = null;
    };
    window.confirmFavorite = function() {
      if (!pendingFavorite) return;
      var item = Favorites.add(pendingFavorite.text, currentCharId, currentChapterId, pendingFavorite.sectionId, pendingFavorite.offset);
      if (item) {
        updateFavPanel();
        showToast('已添加到收藏夹');
      } else {
        showToast('已在收藏夹中');
      }
      closeFavModal();
    }

    // ===== 选中文字工具栏 =====
    var pendingSelection = null;
    function clearPendingSelection() {
      pendingSelection = null;
      hideSelectionToolbar();
      var sel = window.getSelection();
      if (sel.rangeCount) sel.removeAllRanges();
    }
    function showSelectionToolbar(x, y) {
      var toolbar = document.getElementById('selectionToolbar');
      // 强制回流以获取真实宽度
      var tw = toolbar.offsetWidth || 120;
      // 水平边界检测
      var left = x;
      if (left - tw / 2 < 10) left = tw / 2 + 10;
      if (left + tw / 2 > window.innerWidth - 10) left = window.innerWidth - tw / 2 - 10;
      toolbar.style.left = left + 'px';
      toolbar.style.top = y + 'px';
      toolbar.classList.add('show');
    }
    function hideSelectionToolbar() {
      document.getElementById('selectionToolbar').classList.remove('show');
    }

    // ===== 选中文字处理 =====
    // 立即捕获选区（解决手机上选区被清空的时序问题）
    function captureSelection() {
      var sel = window.getSelection();
      var text = sel.toString().trim();
      if (!text || text.length < 2) return null;
      if (!document.getElementById('readerContent').contains(sel.anchorNode)) return null;
      var range = sel.getRangeAt(0);
      var startBlock = range.startContainer.parentElement;
      if (!startBlock || !startBlock.classList.contains('text-block')) {
        startBlock = range.startContainer.parentElement.closest('.text-block');
      }
      var endBlock = range.endContainer.parentElement;
      if (!endBlock || !endBlock.classList.contains('text-block')) {
        endBlock = range.endContainer.parentElement.closest('.text-block');
      }
      var isCrossBlock = startBlock && endBlock && startBlock !== endBlock;
      
      // 获取覆盖的所有 block
      var blocks = [];
      if (isCrossBlock) {
        var allBlocks = Array.from(document.querySelectorAll('.text-block'));
        var startIdx = allBlocks.indexOf(startBlock);
        var endIdx = allBlocks.indexOf(endBlock);
        if (startIdx > -1 && endIdx > -1 && startIdx <= endIdx) {
          for (var i = startIdx; i <= endIdx; i++) {
            blocks.push(allBlocks[i]);
          }
        }
      }
      
      // 为每个 block 计算对应的选中文本
      var blockHighlights = [];
      if (isCrossBlock && blocks.length > 0) {
        blocks.forEach(function(block, i) {
          var blockRange = document.createRange();
          if (i === 0) { // 第一个 block
            blockRange.setStart(range.startContainer, range.startOffset);
            blockRange.setEndAfter(block.lastChild);
          } else if (i === blocks.length - 1) { // 最后一个 block
            blockRange.setStartBefore(block.firstChild);
            blockRange.setEnd(range.endContainer, range.endOffset);
          } else { // 中间的 block，全选
            blockRange.selectNodeContents(block);
          }
          var blockText = blockRange.toString().trim();
          if (blockText) {
            blockHighlights.push({
              sectionId: block.getAttribute('data-section-id'),
              text: blockText
            });
          }
        });
      }
      
      return {
        text: text,
        sectionId: startBlock ? startBlock.getAttribute('data-section-id') : '',
        isCrossBlock: isCrossBlock,
        startSectionId: startBlock ? startBlock.getAttribute('data-section-id') : '',
        endSectionId: endBlock ? endBlock.getAttribute('data-section-id') : '',
        blockHighlights: isCrossBlock ? blockHighlights : null
      };
    }

    function onSelection() {
      var captured = captureSelection();
      if (captured) {
        pendingSelection = captured;
        var sel = window.getSelection();
        var range = sel.getRangeAt(0);
        var rects = range.getClientRects();
        var lastRect = rects.length > 0 ? rects[rects.length - 1] : range.getBoundingClientRect();
        var x = lastRect.left + lastRect.width / 2;
        var y = lastRect.bottom + 8;
        showSelectionToolbar(x, y);
      } else {
        hideSelectionToolbar();
      }
    }

    document.addEventListener('mouseup', function(e) {
      if (document.getElementById('readerContent').contains(e.target)) {
        setTimeout(onSelection, 50);
      } else if (!document.getElementById('selectionToolbar').contains(e.target)) {
        setTimeout(function() { hideSelectionToolbar(); }, 150);
      }
    });
    // 移动端：touchstart 时先清除旧状态，touchend 立即捕获
    document.addEventListener('touchend', function(e) {
      if (document.getElementById('readerContent').contains(e.target)) {
        // 先立即捕获（不等延迟，避免选区被清空）
        var captured = captureSelection();
        if (captured) {
          pendingSelection = captured;
          // 延迟仅用于等浏览器稳定选区 rect
          setTimeout(function() {
            if (pendingSelection && pendingSelection.text === captured.text) {
              onSelection();
            }
          }, 80);
        } else {
          setTimeout(onSelection, 80);
        }
      } else if (!document.getElementById('selectionToolbar').contains(e.target)) {
        setTimeout(function() { hideSelectionToolbar(); }, 250);
      }
    });

    function renderEvidenceCards(round) {
      var listEl = document.getElementById('clueList');

      // 单页漫画（仅江宴可见）
      if (round === 'comic') {
        listEl.innerHTML = '<div class="evidence-map-wrap" style="animation: evidenceSlideIn 0.4s cubic-bezier(0.4,0,0.2,1) both">'

          + '</div>'

        return;

      // 小岳的日记
      if (round === 'diary') {
        var entries = typeof XIAOYUE_DIARY !== 'undefined' && XIAOYUE_DIARY && XIAOYUE_DIARY[currentCharId];
        if (!entries || !entries.length) {
          listEl.innerHTML = '<p style="color:var(--text-muted);text-align:center;padding:2rem 0">暂无日记。</p>';
          return;
        }
        var diaryHtml = '<div class="diary-wrap">';
        diaryHtml += '<div class="diary-title">小岳的日记</div>';
        entries.forEach(function(entry, idx) {
          diaryHtml += '<div class="diary-entry" style="animation: evidenceSlideIn 0.45s cubic-bezier(0.4,0,0.2,1) ' + (idx * 0.08) + 's both">';
          diaryHtml += '<div class="diary-date">' + escapeHtml(entry.date) + '　' + escapeHtml(entry.weather) + '</div>';
          diaryHtml += '<div class="diary-content">' + escapeHtml(entry.content).replace(/\n/g, '<br>') + '</div>';
          diaryHtml += '</div>';
        });
        diaryHtml += '</div>';
        listEl.innerHTML = diaryHtml;
        return;
      }

      var roundData = EVIDENCE_DATA.find(function(r) { return r.round === round; });
      if (!roundData || !roundData.clues.length) {

      var html = '';
      roundData.clues.forEach(function(clue, idx) {

          html += '<span class="evidence-label">' + escapeHtml(clue.label) + '</span>';
          html += '</div>';
          html += '<div class="evidence-card-body">' + escapeHtml(clue.content).replace(/\n/g, '<br>') + '</div>';
          html += '</div>';
          html += '</div>';
        } else {
          // 未翻开：3D 翻转卡片
          html += '<div class="evidence-card" data-eid="' + clue.id + '" style="animation-delay:' + delay + 's" onclick="flipEvidenceCard(this)">';
          html += '<div class="evidence-card-inner">';
          html += '<div class="evidence-card-front">';
          html += '<div class="evidence-card-header">';
          html += '<span class="evidence-char-badge">' + escapeHtml(clue.character) + '</span>';
          html += '<span class="evidence-label">' + escapeHtml(clue.label) + '</span>';
          html += '</div>';
          html += '<div class="evidence-hint">点击翻开查看线索</div>';
          html += '</div>';
          html += '<div class="evidence-card-back">';
          html += '<div class="evidence-card-header" style="margin-bottom:0.4rem">';
          html += '<span class="evidence-char-badge">' + escapeHtml(clue.character) + '</span>';
          html += '<span class="evidence-label">' + escapeHtml(clue.label) + '</span>';
          html += '</div>';
          html += '<div class="evidence-card-body">' + escapeHtml(clue.content).replace(/\n/g, '<br>') + '</div>';
          html += '</div>';
          html += '</div>';
          html += '</div>';
        }

    function scrollToSection(sectionId, paragraphIdx, query) {
      var el = null;
      // 如果有段落索引，直接精确查找
      if (paragraphIdx !== null && paragraphIdx !== undefined && paragraphIdx !== '') {
        el = document.querySelector('[data-section-id="' + sectionId + '_' + paragraphIdx + '"]');
      }
      // 如果精确没找到，或者没有段落索引，尝试其他方式
      if (!el) {
        el = document.querySelector('[data-section-id="' + sectionId + '"]');
      }
      if (!el) {
        var candidates = document.querySelectorAll('[data-section-id^="' + sectionId + '_"]');
        if (query && candidates.length > 0) {
          var ql = query.toLowerCase();
          for (var ci = 0; ci < candidates.length; ci++) {
            if (candidates[ci].textContent.toLowerCase().indexOf(ql) >= 0) {
              el = candidates[ci];
              break;
            }
          }
        }
        if (!el && candidates.length > 0) {
          el = candidates[0];
        }
      }
      if (!el) {
        el = document.querySelector('.theater-block[data-section-id="' + sectionId + '"]');
      }
      
      if (el) {
        el.scrollIntoView({ behavior: 'smooth', block: 'center' });
        if (query && el.textContent.toLowerCase().indexOf(query.toLowerCase()) >= 0) {
          var escapedQuery = escapeRegex(query);
          el.innerHTML = el.innerHTML.replace(
            new RegExp('(' + escapedQuery + ')', 'gi'),
            '<mark class="search-mark" style="background:rgba(255,235,59,0.5);color:inherit;border-radius:2px;padding:0 2px">$1</mark>'
          );
          setTimeout(function() {
            el.querySelectorAll('mark.search-mark').forEach(function(m) {
              var parent = m.parentNode;
              parent.replaceChild(document.createTextNode(m.textContent), m);
              parent.normalize();
            });
            restoreHighlights();
          }, 3000);
        } else {
          el.style.transition = 'background 0.3s';
          el.style.background = 'var(--highlight-bg)';
          setTimeout(function() { el.style.background = ''; }, 1800);
        }
      }
    }

    // ===== 搜索 =====
    var _lastSearchQuery = '';
    window.doSearch = function() {
      var query = document.getElementById('searchInput').value.trim();
      _lastSearchQuery = query;
      var container = document.getElementById('searchResults');
      if (!query) {
        container.innerHTML = '<p style="color:var(--text-muted);text-align:center;padding:1rem 0">输入关键词搜索所有剧本内容。</p>';
        return;
      }
      // 允许单字搜索
      if (query.length < 1) {
        container.innerHTML = '<p style="color:var(--text-muted);text-align:center;padding:1rem 0">请输入搜索关键词。</p>';
        return;
      }
      var results = Search.execute(query, SCRIPT_DATA, { charFilter: currentCharId });
      if (results.length === 0) {
        container.innerHTML = '<p style="color:var(--text-muted);text-align:center;padding:1rem 0">未找到匹配结果。</p>';
        return;
      }
      var html = '<p style="font-size:0.78rem;color:var(--text-muted);margin-bottom:0.5rem">找到 ' + results.length + ' 条</p>';
      results.forEach(function(r, idx) {
        html += '<div class="search-result-item" data-result-idx="' + idx + '">';
        html += '<div class="result-label">' + escapeHtml(r.chapterTitle) + '</div>';
        // 清理context中的HTML标签，只显示纯文本
        var cleanContext = r.context.replace(/<[^>]+>/g, '');
        html += '<div>' + escapeHtml(cleanContext).replace(/\n/g, ' ') + '</div>';
        html += '</div>';
      });
      container.innerHTML = html;
      // 绑定点击事件
      container.querySelectorAll('.search-result-item').forEach(function(item) {
        var idx = parseInt(item.getAttribute('data-result-idx'));
        if (idx >= 0 && idx < results.length) {
          var r = results[idx];
          // 将数据存储在元素上，避免闭包问题
          // sectionId 现在已经是完整的标识符（包含段落索引），与收藏功能一致
          item.setAttribute('data-chapter-id', r.chapterId);
          item.setAttribute('data-section-id', r.sectionId);
        }
        item.addEventListener('click', function(e) {
          e.preventDefault();
          var chapterId = this.getAttribute('data-chapter-id');
          var sectionId = this.getAttribute('data-section-id');
          if (chapterId && sectionId) {
            jumpToSearchResult(chapterId, sectionId, _lastSearchQuery);
          }
        });
      });
    };
    window.jumpToSearchResult = function(chapterId, sectionId, query) {
      closeAllPanels();
      if (chapterId !== currentChapterId) {
        switchChapter(chapterId);
        setTimeout(function() { scrollToSection(sectionId, null, query); }, 300);
      } else { scrollToSection(sectionId, null, query); }
    };

    // ===== 阅读进度 =====
    function updateReadProgress() {
      var st = window.scrollY || document.documentElement.scrollTop;
      var dh = document.documentElement.scrollHeight - window.innerHeight;
      var pct = dh > 0 ? Math.min(100, (st / dh) * 100) : 0;
      document.getElementById('readProgress').style.width = pct + '%';
    }
    window.addEventListener('scroll', updateReadProgress, { passive: true });

    // ===== 设置 =====
    window.setTheme = function(theme) {
      Settings.theme = theme;
      document.querySelectorAll('.theme-dot').forEach(function(d) { d.classList.remove('active'); });
      var dot = document.querySelector('.theme-dot.' + theme);
      if (dot) dot.classList.add('active');
      closeAllPanels();
    };
    window.setFontSize = function(size) {
      Settings.fontSize = size;
      document.querySelectorAll('.font-btn').forEach(function(b) { b.classList.remove('active'); });
      var sizes = ['small', 'medium', 'large', 'xlarge'];
      document.querySelectorAll('.font-btn')[sizes.indexOf(size)].classList.add('active');
    };
    setTimeout(function() {
      var s = Settings.getAll();
      var td = document.querySelector('.theme-dot.' + s.theme);
      if (td) { document.querySelectorAll('.theme-dot').forEach(function(d) { d.classList.remove('active'); }); td.classList.add('active'); }
      var sizes = ['small', 'medium', 'large', 'xlarge'];
      var fbs = document.querySelectorAll('.font-btn');
      fbs.forEach(function(b) { b.classList.remove('active'); });
      var si = sizes.indexOf(s.fontSize);
      if (si >= 0 && fbs[si]) fbs[si].classList.add('active');
    }, 100);

    // ===== 特殊章节 =====
    window.unlockSpecial = function() {
      var input = document.getElementById('specialCodeInput').value.trim();
      var msgEl = document.getElementById('specialMsg');
      if (input === '1233') {
        msgEl.style.color = 'var(--task-done)';
        msgEl.textContent = '解锁成功';
        Storage.set('special_unlocked', true);
        setTimeout(function() {
          document.getElementById('specialUnlock').classList.add('hidden');
          document.getElementById('specialOptions').classList.remove('hidden');
          renderSpecialOptions();
          msgEl.textContent = '';
        }, 600);
      } else {
        msgEl.style.color = 'var(--clue-tag)';
        msgEl.textContent = '密码错误，请重试';
      }
    };

    // ===== 彩蛋（撒花+淡出文字） =====
    var _eggAnimId = null;
    var _eggParticles = [];
    var _eggCtx = null;
    var _eggCanvas = null;

    window.openEgg = function(eggId) {
      var egg = null;
      if (typeof EASTER_EGGS !== 'undefined') {
        EASTER_EGGS.forEach(function(e) { if (e.id === eggId) egg = e; });
      }
      if (!egg) return;
      var overlay = document.getElementById('eggOverlay');
      var textEl = document.getElementById('eggText');
      var canvas = document.getElementById('eggCanvas');
      textEl.textContent = egg.text;
      textEl.style.opacity = '0';
      textEl.style.transform = 'translateY(20px) scale(0.9)';
      overlay.classList.add('show');
      document.body.style.overflow = 'hidden';
      // 初始化 canvas
      _eggCanvas = canvas;
      _eggCanvas.width = window.innerWidth;
      _eggCanvas.height = window.innerHeight;
      _eggCtx = _eggCanvas.getContext('2d');
      _eggParticles = [];
      // 生成粒子
      spawnConfetti(180);
      // 延迟显示文字
      setTimeout(function() {
        textEl.style.transition = 'opacity 2s ease, transform 2s ease';
        textEl.style.opacity = '1';
        textEl.style.transform = 'translateY(0) scale(1)';
      }, 600);
      // 开始动画
      if (_eggAnimId) cancelAnimationFrame(_eggAnimId);
      animateConfetti();
    };

    window.closeEgg = function() {
      var overlay = document.getElementById('eggOverlay');
      overlay.classList.remove('show');
      document.body.style.overflow = '';
      if (_eggAnimId) { cancelAnimationFrame(_eggAnimId); _eggAnimId = null; }
      _eggParticles = [];
      if (_eggCtx) _eggCtx.clearRect(0, 0, _eggCanvas.width, _eggCanvas.height);
    };

    function spawnConfetti(count) {
      var colors = ['#FFD700','#FF6B6B','#4ECDC4','#45B7D1','#96CEB4','#FFEAA7','#DDA0DD','#F0E68C','#FF69B4','#87CEEB','#FFA07A','#98D8C8'];
      var shapes = ['rect','circle','star'];
      for (var i = 0; i < count; i++) {
        _eggParticles.push({
          x: Math.random() * _eggCanvas.width,
          y: Math.random() * _eggCanvas.height * -1 - 20,
          w: Math.random() * 10 + 5,
          h: Math.random() * 6 + 3,
          color: colors[Math.floor(Math.random() * colors.length)],
          shape: shapes[Math.floor(Math.random() * shapes.length)],
          vx: (Math.random() - 0.5) * 3,
          vy: Math.random() * 2 + 1.5,
          rotation: Math.random() * 360,
          rotSpeed: (Math.random() - 0.5) * 8,
          opacity: Math.random() * 0.5 + 0.5,
          wobble: Math.random() * Math.PI * 2,
          wobbleSpeed: Math.random() * 0.05 + 0.02
        });
      }
    }

    function animateConfetti() {
      _eggCtx.clearRect(0, 0, _eggCanvas.width, _eggCanvas.height);
      var alive = false;
      for (var i = 0; i < _eggParticles.length; i++) {
        var p = _eggParticles[i];
        p.y += p.vy;
        p.x += p.vx + Math.sin(p.wobble) * 0.8;
        p.rotation += p.rotSpeed;
        p.wobble += p.wobbleSpeed;
        p.vy += 0.02;
        if (p.y < _eggCanvas.height + 30) alive = true;
        _eggCtx.save();
        _eggCtx.translate(p.x, p.y);
        _eggCtx.rotate(p.rotation * Math.PI / 180);
        _eggCtx.globalAlpha = p.opacity;
        _eggCtx.fillStyle = p.color;
        if (p.shape === 'rect') {
          _eggCtx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
        } else if (p.shape === 'circle') {
          _eggCtx.beginPath();
          _eggCtx.arc(0, 0, p.w / 2.5, 0, Math.PI * 2);
          _eggCtx.fill();
        } else {
          drawStar(_eggCtx, 0, 0, 5, p.w / 2, p.w / 4);
        }
        _eggCtx.restore();
      }
      if (alive) {
        _eggAnimId = requestAnimationFrame(animateConfetti);
      } else {
        // 持续补充粒子
        spawnConfetti(40);
        _eggAnimId = requestAnimationFrame(animateConfetti);
      }
    }

    function drawStar(ctx, cx, cy, spikes, outerR, innerR) {
      var rot = Math.PI / 2 * 3;
      var step = Math.PI / spikes;
      ctx.beginPath();
      ctx.moveTo(cx, cy - outerR);
      for (var i = 0; i < spikes; i++) {
        ctx.lineTo(cx + Math.cos(rot) * outerR, cy + Math.sin(rot) * outerR);
        rot += step;
        ctx.lineTo(cx + Math.cos(rot) * innerR, cy + Math.sin(rot) * innerR);
        rot += step;
      }
      ctx.lineTo(cx, cy - outerR);
      ctx.closePath();
      ctx.fill();
    }

    // ===== 点名册 =====
    window.openRollbook = function() {
      var data = typeof ROLLBOOK_DATA !== 'undefined' && ROLLBOOK_DATA[currentCharId];
      if (!data) return;
      // 从 localStorage 恢复用户编辑的数据
      var saved = Storage.get('rollbook_' + currentCharId);
      var rows = data.rows;
      if (saved) {
        try { rows = JSON.parse(saved); } catch(e) {}
      }
      var html = '';
      html += '<div class="rollbook-title">' + escapeHtml(data.title) + '</div>';
      html += '<table class="rollbook-table">';
      html += '<thead><tr>';
      html += '<th class="rollbook-th rollbook-th-idx">#</th>';
      data.columns.forEach(function(col) {
        html += '<th class="rollbook-th">' + escapeHtml(col) + '</th>';
      });

    window.saveRollbook = function() {

      var inputs = document.querySelectorAll('.rollbook-input');
      var rows = [];
      var maxRow = -1;
      inputs.forEach(function(input) {
        var r = parseInt(input.getAttribute('data-row'));
        var f = input.getAttribute('data-field');
        if (r > maxRow) { maxRow = r; rows.length = r + 1; }
        if (!rows[r]) rows[r] = { name: '', code: '', number: '' };
        rows[r][f] = input.value;

      }

    function initPuzzle(map) {
      var grid = document.getElementById('mfGrid');
      var pool = document.getElementById('mfPool');
      var cols = map.cols, rows = map.rows;
      // 计算格子尺寸（响应式）
      var areaW = Math.min(window.innerWidth - 40, 560);
      var cellW = Math.floor(areaW / cols);
      var cellH = Math.floor(cellW * 0.75);
      grid.style.width = (cellW * cols) + 'px';
      grid.style.height = (cellH * rows) + 'px';
      grid.style.gridTemplateColumns = 'repeat(' + cols + ', ' + cellW + 'px)';
      grid.style.gridTemplateRows = 'repeat(' + rows + ', ' + cellH + 'px)';
      // 生成网格占位
      for (var r = 0; r < rows; r++) {
        for (var c = 0; c < cols; c++) {
          var slot = document.createElement('div');
          slot.className = 'mapfrag-slot';
          slot.dataset.col = c;
          slot.dataset.row = r;
          slot.style.backgroundImage = 'url(' + map.file + ')';
          slot.style.backgroundSize = (cellW * cols) + 'px ' + (cellH * rows) + 'px';
          slot.style.backgroundPosition = (-c * cellW) + 'px ' + (-r * cellH) + 'px';
          slot.style.opacity = '0';
          slot.dataset.bgSet = '1';
          grid.appendChild(slot);
        }
      }
      // 生成碎片（随机顺序）
      var pieces = [];
      for (var r = 0; r < rows; r++) {
        for (var c = 0; c < cols; c++) {
          pieces.push({ col: c, row: r });
        }
      }
      // Fisher-Yates shuffle
      for (var i = pieces.length - 1; i > 0; i--) {
        var j = Math.floor(Math.random() * (i + 1));
        var tmp = pieces[i]; pieces[i] = pieces[j]; pieces[j] = tmp;
      }
      pieces.forEach(function(p) {
        var piece = document.createElement('div');
        piece.className = 'mapfrag-piece';
        piece.dataset.col = p.col;
        piece.dataset.row = p.row;
        piece.style.width = cellW + 'px';
        piece.style.height = cellH + 'px';
        piece.style.backgroundImage = 'url(' + map.file + ')';
        piece.style.backgroundSize = (cellW * cols) + 'px ' + (cellH * rows) + 'px';
        piece.style.backgroundPosition = (-p.col * cellW) + 'px ' + (-p.row * cellH) + 'px';
        piece.style.position = 'relative';
        // 拖拽事件
        piece.addEventListener('mousedown', onPieceDown);
        piece.addEventListener('touchstart', onPieceDown, { passive: false });
        pool.appendChild(piece);
      });
    }

    function onPieceDown(e) {
      e.preventDefault();
      var piece = e.currentTarget;
      _mfState.dragging = piece;
      var rect = piece.getBoundingClientRect();
      var clientX = e.touches ? e.touches[0].clientX : e.clientX;
      var clientY = e.touches ? e.touches[0].clientY : e.clientY;
      _mfState.dragOffsetX = clientX - rect.left;
      _mfState.dragOffsetY = clientY - rect.top;
      // 切换到 fixed 定位
      piece.style.position = 'fixed';
      piece.style.left = rect.left + 'px';
      piece.style.top = rect.top + 'px';
      piece.style.zIndex = '100';
      piece.style.transition = 'none';
      piece.style.pointerEvents = 'none';
      document.addEventListener('mousemove', onPieceMove);
      document.addEventListener('mouseup', onPieceUp);
      document.addEventListener('touchmove', onPieceMove, { passive: false });
      document.addEventListener('touchend', onPieceUp);
    }

    function onPieceMove(e) {
      e.preventDefault();
      if (!_mfState.dragging) return;
      var clientX = e.touches ? e.touches[0].clientX : e.clientX;
      var clientY = e.touches ? e.touches[0].clientY : e.clientY;
      _mfState.dragging.style.left = (clientX - _mfState.dragOffsetX) + 'px';
      _mfState.dragging.style.top = (clientY - _mfState.dragOffsetY) + 'px';
    }

    function onPieceUp(e) {
      if (!_mfState.dragging) return;
      document.removeEventListener('mousemove', onPieceMove);
      document.removeEventListener('mouseup', onPieceUp);
      document.removeEventListener('touchmove', onPieceMove);
      document.removeEventListener('touchend', onPieceUp);
      var piece = _mfState.dragging;
      _mfState.dragging = null;
      piece.style.pointerEvents = '';
      // 检查是否在正确位置
      var pCol = parseInt(piece.dataset.col);
      var pRow = parseInt(piece.dataset.row);
      var grid = document.getElementById('mfGrid');
      var slots = grid.querySelectorAll('.mapfrag-slot');
      var placed = false;
      slots.forEach(function(slot) {
        if (placed) return;
        var sCol = parseInt(slot.dataset.col);
        var sRow = parseInt(slot.dataset.row);
        if (sCol !== pCol || sRow !== pRow) return;
        var sr = slot.getBoundingClientRect();
        var pr = piece.getBoundingClientRect();
        var pcx = pr.left + pr.width / 2;
        var pcy = pr.top + pr.height / 2;
        var scx = sr.left + sr.width / 2;
        var scy = sr.top + sr.height / 2;
        var dist = Math.sqrt((pcx - scx) * (pcx - scx) + (pcy - scy) * (pcy - scy));
        if (dist < 40) {
          // 吸附
          piece.style.position = 'absolute';
          piece.style.left = '0';
          piece.style.top = '0';
          piece.style.transition = 'all 0.2s ease';
          piece.style.zIndex = '';
          piece.classList.add('mapfrag-placed');
          piece.removeEventListener('mousedown', onPieceDown);
          piece.removeEventListener('touchstart', onPieceDown);
          slot.appendChild(piece);
          slot.style.opacity = '1';
          placed = true;
          // 检查是否全部完成
          checkPuzzleComplete();
        }
      });
      if (!placed) {
        // 弹回碎片池
        piece.style.position = 'relative';
        piece.style.left = '';
        piece.style.top = '';
        piece.style.transition = 'all 0.3s ease';
        piece.style.zIndex = '';
        var pool = document.getElementById('mfPool');
        if (!pool.contains(piece)) pool.appendChild(piece);
      }
    }

    function checkPuzzleComplete() {
      var map = MAP_FRAGMENTS[_mfState.currentTab];
      var grid = document.getElementById('mfGrid');
      var slots = grid.querySelectorAll('.mapfrag-slot');
      var total = slots.length;
      var filled = 0;
      slots.forEach(function(slot) {
        if (slot.querySelector('.mapfrag-piece')) filled++;
      });
      if (filled === total) {
        Storage.set('mapfrag_' + map.id, 'solved');
        // 完成动画
        grid.classList.add('mapfrag-complete');
        setTimeout(function() {
          renderMapFragUI();
        }, 1200);
      }
    }

    window.resetAllData = function() {
      if (confirm('确定要重置所有数据吗？此操作不可撤销。')) {
        Storage.clearAll();
        Favorites.getAll().forEach(function(f) { Favorites.remove(f.id); });
        Favorites.getAllHighlights().forEach(function(h) { Favorites.removeHighlight(h.id); });
        Clues.reset();
        Tasks.resetAll();
        revealedSet = {};
        Storage.remove(REVEALED_KEY);
        chapterReadDone = {};
        showToast('数据已重置');
        setTimeout(function() { location.reload(); }, 500);
      }
    };

    window.goBack = function() { location.href = 'character.html'; };

    // ===== Toast =====
    function showToast(msg) {
      var toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      clearTimeout(toast._tid);
      toast._tid = setTimeout(function() { toast.classList.remove('show'); }, AppConfig.toastDuration);
    }

    window.switchChapter = switchChapter;
    window.prevChapter = prevChapter;
    window.nextChapter = nextChapter;

    Debug.info('Reader initialized', { charId: currentCharId, version: AppConfig.version });
  })();
  </script>
</body>
</html>
